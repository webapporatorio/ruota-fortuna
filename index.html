<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruota della Fortuna - Oratorio in Festa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://tombola-53e42-default-rtdb.europe-west1.firebasedatabase.app/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const ruotaRef = ref(db, 'ruota_manche_v3');

        let isAdmin = false;
        let numeroManche = 1;
        let coloreSelezionato = 'bg-white';
        let nomeColoreSelezionato = 'Bianco';
        let bloccato = false;

        window.sbloccaAdmin = () => {
            const pass = prompt("Codice Operatore:");
            if (pass === "or@torio") {
                isAdmin = true;
                document.getElementById('admin-panel').classList.remove('hidden');
            }
        };

        window.cambiaColore = (colore, nome, el) => {
            if(bloccato) return;
            coloreSelezionato = colore;
            nomeColoreSelezionato = nome;
            
            document.querySelectorAll('.dot-choice').forEach(d => d.classList.remove('ring-4', 'ring-white', 'scale-110'));
            el.classList.add('ring-4', 'ring-white', 'scale-110');
            
            document.getElementById('nome-colore-display').innerText = nome;
            const inputNum = document.getElementById('input-numero');
            inputNum.className = `bg-slate-800 p-6 rounded-3xl text-center text-5xl font-black outline-none border-4 transition-all ${colore.replace('bg-', 'border-')}`;
            
            if(colore === 'bg-white') inputNum.classList.replace('text-white', 'text-slate-900');
            else { inputNum.classList.remove('text-slate-900'); inputNum.classList.add('text-white'); }
        };

        window.inviaNumero = () => {
            const input = document.getElementById('input-numero');
            if(!input.value) return;

            push(ruotaRef, {
                valore: input.value,
                colore: coloreSelezionato,
                tipo: 'numero',
                ts: serverTimestamp()
            });

            input.value = '';
            bloccato = true;
            document.getElementById('color-picker-container').classList.add('opacity-30', 'pointer-events-none');
            input.focus();
        };

        window.nuovaManche = () => {
            numeroManche++;
            bloccato = false;
            document.getElementById('color-picker-container').classList.remove('opacity-30', 'pointer-events-none');

            push(ruotaRef, {
                tipo: 'separatore',
                titolo: `Numeri della ${numeroManche}° ruota`,
                ts: serverTimestamp()
            });
        };

        window.resetRuota = () => {
            if(confirm("Vuoi cancellare tutto?")) {
                remove(ruotaRef);
                location.reload();
            }
        };

        onValue(ruotaRef, (snapshot) => {
            const container = document.getElementById('feed-estrazioni');
            container.innerHTML = '';
            const data = snapshot.val();
            
            if (data) {
                let html = `<div class="border-l-4 border-orange-500 pl-4 mb-6 text-left">
                                <h2 class="text-orange-500 font-black text-xl italic uppercase tracking-tighter">Numeri della 1° ruota</h2>
                            </div>
                            <div class="flex flex-wrap gap-3 mb-12">`;

                Object.values(data).forEach((item) => {
                    if (item.tipo === 'separatore') {
                        html += `</div>
                                 <div class="border-l-4 border-orange-500 pl-4 mb-6 mt-12 text-left">
                                    <h2 class="text-orange-500 font-black text-xl italic uppercase tracking-tighter">${item.titolo}</h2>
                                 </div>
                                 <div class="flex flex-wrap gap-3 mb-12">`;
                    } else {
                        const textColor = item.colore === 'bg-white' ? 'text-slate-900' : 'text-white';
                        html += `<div class="flex items-center justify-center min-w-[3.5rem] h-14 px-3 rounded-xl text-2xl font-black shadow-lg animate-in zoom-in duration-300 ${item.colore} ${textColor}">
                                    ${item.valore}
                                 </div>`;
                    }
                });
                html += `</div>`;
                container.innerHTML = html;
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            } else {
                container.innerHTML = '<div class="py-10 text-center text-slate-700 font-black text-xl opacity-20 uppercase">In attesa della prima ruota...</div>';
            }
        });
    </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans pb-20">

    <div class="max-w-xl mx-auto p-4">
        <header class="text-center py-10">
            <h1 onclick="sbloccaAdmin()" class="text-4xl font-black text-white uppercase italic tracking-tighter cursor-pointer select-none leading-none">
                ESTRAZIONI DELLA <span class="text-orange-500">LOTTERIA</span>
            </h1>
            <p class="text-slate-400 text-sm font-bold uppercase tracking-[0.3em] mt-2">
                ORATORIO IN FESTA
            </p>
        </header>

        <div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-6 mb-8 text-center shadow-xl">
            <p class="text-slate-300 text-sm leading-relaxed">
                Qui troverai i numeri vincenti di ogni estrazione fatta durante questa serata! 
                <span class="block mt-2 text-orange-400 font-bold italic">Controlla qui sotto.. potresti aver vinto un fantastico premio!</span>
            </p>
        </div>

        <div id="admin-panel" class="hidden mb-10 p-6 bg-slate-900 rounded-[2.5rem] border-2 border-orange-500/30 shadow-2xl">
            <div id="color-picker-container" class="mb-8 text-center">
                <p class="text-[10px] font-black uppercase text-slate-500 mb-4 tracking-widest">
                    Colore Manche: <span id="nome-colore-display" class="text-white">Bianco</span>
                </p>
                <div class="flex flex-wrap justify-center gap-3">
                    <div onclick="cambiaColore('bg-white', 'Bianco', this)" class="dot-choice w-8 h-8 rounded-full bg-white cursor-pointer ring-4 ring-white transition-all scale-110"></div>
                    <div onclick="cambiaColore('bg-red-500', 'Rosso', this)" class="dot-choice w-8 h-8 rounded-full bg-red-500 cursor-pointer transition-all"></div>
                    <div onclick="cambiaColore('bg-blue-500', 'Blu', this)" class="dot-choice w-8 h-8 rounded-full bg-blue-500 cursor-pointer transition-all"></div>
                    <div onclick="cambiaColore('bg-green-500', 'Verde', this)" class="dot-choice w-8 h-8 rounded-full bg-green-500 cursor-pointer transition-all"></div>
                    <div onclick="cambiaColore('bg-yellow-400', 'Giallo', this)" class="dot-choice w-8 h-8 rounded-full bg-yellow-400 cursor-pointer transition-all"></div>
                    <div onclick="cambiaColore('bg-orange-500', 'Arancione', this)" class="dot-choice w-8 h-8 rounded-full bg-orange-500 cursor-pointer transition-all"></div>
                    <div onclick="cambiaColore('bg-purple-600', 'Viola', this)" class="dot-choice w-8 h-8 rounded-full bg-purple-600 cursor-pointer transition-all"></div>
                    <div onclick="cambiaColore('bg-pink-500', 'Rosa', this)" class="dot-choice w-8 h-8 rounded-full bg-pink-500 cursor-pointer transition-all"></div>
                </div>
            </div>
            
            <div class="flex flex-col gap-4">
                <input type="number" id="input-numero" placeholder="--" 
                       class="bg-slate-800 p-6 rounded-3xl text-center text-5xl font-black outline-none border-4 border-white transition-all text-slate-900">
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="inviaNumero()" class="bg-orange-600 text-white p-5 rounded-2xl font-black uppercase text-[10px] shadow-xl active:scale-95 transition-all">
                        NUMERO VINCENTE
                    </button>
                    <button onclick="nuovaManche()" class="bg-slate-700 hover:bg-slate-600 text-white p-5 rounded-2xl font-black uppercase shadow-xl active:scale-95 transition-all text-[10px]">
                        NUOVA ESTRAZIONE
                    </button>
                </div>
                
                <button onclick="resetRuota()" class="text-slate-700 text-[9px] font-bold uppercase mt-2 hover:text-red-500 transition-colors tracking-widest text-center w-full">
                    RESET PARTITA
                </button>
            </div>
        </div>

        <div id="feed-estrazioni" class="px-2"></div>
    </div>

</body>
</html>
